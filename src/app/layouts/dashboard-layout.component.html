<div
  class="flex h-screen w-screen flex-row bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100"
>
  <!-- Desktop Sidebar (hidden on mobile) -->
  <app-sidebar class="hidden lg:flex" />

  <!-- Main content area -->
  <main
    class="flex h-full min-h-0 w-full flex-col"
    [style.marginLeft]="isDesktop() ? SIDEBAR_WIDTH + 'px' : '0px'"
    role="main"
  >
    <router-outlet />
  </main>

  <!-- Mobile Bottom Navigation (hidden on desktop) -->
  <app-mobile-nav class="flex lg:hidden" />

  <!-- Debug Panel (fixed position, bottom-right) -->
  @if (showDebugPanel()) {
    <app-debug-panel />
  }
</div>
