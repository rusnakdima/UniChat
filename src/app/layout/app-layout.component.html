<div class="flex min-h-0 h-screen bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100">
  @if (showSidebar()) {
    <app-sidebar />
  }

  <div class="flex min-w-0 flex-1 flex-col overflow-hidden">
    @if (showHeader()) {
      <app-shared-header
        [title]="headerTitle()"
        [subtitle]="headerSubtitle()"
        [showBackButton]="true"
        backLink="/dashboard"
      />
    }

    <main class="flex-1 overflow-y-auto">
      <router-outlet />
    </main>
  </div>
</div>
