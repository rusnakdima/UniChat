<div
  class="flex h-full min-h-0 w-full flex-col overflow-hidden"
  [class.bg-white]="themeMode() === 'light'"
  [class.text-zinc-900]="themeMode() === 'light'"
  [class.bg-zinc-950]="themeMode() === 'dark'"
  [class.text-zinc-100]="themeMode() === 'dark'"
>
  <div class="flex-1 space-y-6 overflow-y-auto p-6 pb-24 md:pb-6">
    <!-- Export Statistics -->
    <div
      class="rounded-xl p-4"
      [class.border]="true"
      [class.border-zinc-200]="themeMode() === 'light'"
      [class.bg-zinc-50]="themeMode() === 'light'"
      [class.border-zinc-800]="themeMode() === 'dark'"
      [class.glass]="themeMode() === 'dark'"
    >
      <h3 class="mb-4 text-sm font-semibold">Export Statistics</h3>
      <div class="grid grid-cols-2 gap-4 md:grid-cols-4">
        <div
          class="rounded-lg p-3 text-center"
          [class.bg-white]="themeMode() === 'light'"
          [class.bg-zinc-800]="themeMode() === 'dark'"
        >
          <div
            class="text-2xl font-bold"
            [class.text-zinc-900]="themeMode() === 'light'"
            [class.text-zinc-100]="themeMode() === 'dark'"
          >
            {{ exportStats().totalChannels }}
          </div>
          <div class="text-xs text-zinc-500">Channels</div>
        </div>
        <div
          class="rounded-lg p-3 text-center"
          [class.bg-white]="themeMode() === 'light'"
          [class.bg-zinc-800]="themeMode() === 'dark'"
        >
          <div
            class="text-2xl font-bold"
            [class.text-zinc-900]="themeMode() === 'light'"
            [class.text-zinc-100]="themeMode() === 'dark'"
          >
            {{ exportStats().totalMessages }}
          </div>
          <div class="text-xs text-zinc-500">Messages</div>
        </div>
        <div
          class="rounded-lg p-3 text-center"
          [class.bg-white]="themeMode() === 'light'"
          [class.bg-zinc-800]="themeMode() === 'dark'"
        >
          <div class="text-2xl font-bold text-[#9146FF]">
            {{ exportStats().byPlatform.twitch }}
          </div>
          <div class="text-xs text-zinc-500">Twitch</div>
        </div>
        <div
          class="rounded-lg p-3 text-center"
          [class.bg-white]="themeMode() === 'light'"
          [class.bg-zinc-800]="themeMode() === 'dark'"
        >
          <div class="text-2xl font-bold text-[#53FC18]">
            {{ exportStats().byPlatform.kick }}
          </div>
          <div class="text-xs text-zinc-500">Kick</div>
        </div>
      </div>
    </div>

    <!-- Export Options -->
    <div
      class="rounded-xl p-6"
      [class.border]="true"
      [class.border-zinc-200]="themeMode() === 'light'"
      [class.bg-zinc-50]="themeMode() === 'light'"
      [class.border-zinc-800]="themeMode() === 'dark'"
      [class.glass]="themeMode() === 'dark'"
    >
      <h3 class="mb-4 text-sm font-semibold">Export Options</h3>
      <div class="space-y-4">
        <!-- Format Selection -->
        <div>
          <label
            class="mb-2 block text-sm font-medium"
            [class.text-zinc-700]="themeMode() === 'light'"
            [class.text-zinc-300]="themeMode() === 'dark'"
          >
            Format
          </label>
          <select
            [(ngModel)]="exportFormat"
            class="w-full rounded-lg border px-3 py-2 text-sm transition outline-none focus:ring-2 focus:ring-indigo-500"
            [class.border-zinc-300]="themeMode() === 'light'"
            [class.bg-white]="themeMode() === 'light'"
            [class.text-zinc-900]="themeMode() === 'light'"
            [class.border-zinc-700]="themeMode() === 'dark'"
            [class.bg-zinc-800]="themeMode() === 'dark'"
            [class.text-zinc-100]="themeMode() === 'dark'"
          >
            <option value="txt">Plain Text (TXT)</option>
            <option value="json">JSON (Structured)</option>
            <option value="csv">CSV (Spreadsheet)</option>
          </select>
        </div>

        <!-- Checkboxes -->
        <div class="flex flex-wrap gap-4">
          <label class="flex cursor-pointer items-center gap-2">
            <input
              type="checkbox"
              [(ngModel)]="exportIncludeTimestamps"
              class="h-4 w-4 rounded border-zinc-300 text-indigo-600 focus:ring-indigo-500"
            />
            <span
              class="text-sm"
              [class.text-zinc-700]="themeMode() === 'light'"
              [class.text-zinc-300]="themeMode() === 'dark'"
            >
              Include Timestamps
            </span>
          </label>
          <label class="flex cursor-pointer items-center gap-2">
            <input
              type="checkbox"
              [(ngModel)]="exportIncludePlatform"
              class="h-4 w-4 rounded border-zinc-300 text-indigo-600 focus:ring-indigo-500"
            />
            <span
              class="text-sm"
              [class.text-zinc-700]="themeMode() === 'light'"
              [class.text-zinc-300]="themeMode() === 'dark'"
            >
              Include Platform
            </span>
          </label>
          <label class="flex cursor-pointer items-center gap-2">
            <input
              type="checkbox"
              [(ngModel)]="exportIncludeBadges"
              class="h-4 w-4 rounded border-zinc-300 text-indigo-600 focus:ring-indigo-500"
            />
            <span
              class="text-sm"
              [class.text-zinc-700]="themeMode() === 'light'"
              [class.text-zinc-300]="themeMode() === 'dark'"
            >
              Include Badges
            </span>
          </label>
        </div>
      </div>
    </div>

    <!-- Export Actions -->
    <div
      class="rounded-xl p-6"
      [class.border]="true"
      [class.border-zinc-200]="themeMode() === 'light'"
      [class.bg-zinc-50]="themeMode() === 'light'"
      [class.border-zinc-800]="themeMode() === 'dark'"
      [class.glass]="themeMode() === 'dark'"
    >
      <h3 class="mb-4 text-sm font-semibold">Export Actions</h3>

      <!-- Channel Selection -->
      <div class="mb-4">
        <label
          class="mb-2 block text-sm font-medium"
          [class.text-zinc-700]="themeMode() === 'light'"
          [class.text-zinc-300]="themeMode() === 'dark'"
        >
          Select Channel
        </label>
        <select
          [(ngModel)]="selectedExportChannelId"
          class="w-full rounded-lg border px-3 py-2 text-sm transition outline-none focus:ring-2 focus:ring-indigo-500"
          [class.border-zinc-300]="themeMode() === 'light'"
          [class.bg-white]="themeMode() === 'light'"
          [class.text-zinc-900]="themeMode() === 'light'"
          [class.border-zinc-700]="themeMode() === 'dark'"
          [class.bg-zinc-800]="themeMode() === 'dark'"
          [class.text-zinc-100]="themeMode() === 'dark'"
        >
          <option value="">-- Select a channel --</option>
          @for (channel of channels(); track channel.id) {
            <option [value]="channel.id">
              {{ channel.platform | uppercase }} - {{ channel.channelName }}
            </option>
          }
        </select>
      </div>

      <!-- Buttons -->
      <div class="flex flex-wrap gap-3">
        <button
          type="button"
          (click)="exportAllHistory()"
          class="rounded-lg bg-indigo-600 px-4 py-2 text-sm font-medium text-white transition hover:bg-indigo-700"
        >
          Export All History
        </button>
        <button
          type="button"
          (click)="exportSelectedChannel()"
          [disabled]="!selectedExportChannelId"
          class="rounded-lg px-4 py-2 text-sm font-medium transition"
          [class.bg-zinc-200]="themeMode() === 'light' && !selectedExportChannelId"
          [class.text-zinc-500]="themeMode() === 'light' && !selectedExportChannelId"
          [class.bg-zinc-700]="themeMode() === 'dark' && !selectedExportChannelId"
          [class.text-zinc-400]="themeMode() === 'dark' && !selectedExportChannelId"
          [class.bg-indigo-600]="themeMode() === 'light' && selectedExportChannelId"
          [class.text-white]="themeMode() === 'light' && selectedExportChannelId"
          [class.hover:bg-indigo-700]="themeMode() === 'light' && selectedExportChannelId"
        >
          Export Selected Channel
        </button>
      </div>
    </div>
  </div>
</div>
