<div
  class="flex h-screen min-h-0 w-full flex-col overflow-hidden"
  [class.bg-white]="themeMode() === 'light'"
  [class.text-zinc-900]="themeMode() === 'light'"
  [class.bg-zinc-950]="themeMode() === 'dark'"
  [class.text-zinc-100]="themeMode() === 'dark'"
>
  <app-dashboard-header
    [pinnedCount]="pinnedCount()"
    [showSearch]="showSearch()"
    [showPinned]="showPinned()"
    [showShortcuts]="showShortcuts()"
    (toggleSearch)="toggleSearch()"
    (togglePinned)="togglePinned()"
    (toggleShortcuts)="toggleShortcuts()"
    (platformFilterChange)="onPlatformFilterChange($event)"
  />

  <div class="flex min-h-0 flex-1 flex-col overflow-hidden">
    <app-dashboard class="mb-22 flex h-full w-full flex-col overflow-y-auto md:mb-0" />
  </div>

  <!-- Search Modal Overlay -->
  @if (showSearch()) {
    <div
      class="absolute inset-0 z-50 flex items-start justify-center overflow-hidden bg-black/50 p-4 pt-12 lg:pt-20"
      (click)="toggleSearch()"
    >
      <app-chat-search
        (click)="$event.stopPropagation()"
        (messageSelected)="onMessageSelected($event)"
        (closeSearch)="toggleSearch()"
      />
    </div>
  }

  <!-- Pinned Messages Panel -->
  @if (showPinned()) {
    <div class="absolute top-[64px] right-4 z-40" (click)="$event.stopPropagation()">
      <div
        class="max-h-[500px] w-full max-w-lg overflow-hidden rounded-xl border shadow-xl"
        [class.border-zinc-200]="themeMode() === 'light'"
        [class.bg-white]="themeMode() === 'light'"
        [class.border-zinc-800]="themeMode() === 'dark'"
        [class.glass]="themeMode() === 'dark'"
      >
        <app-pinned-messages-panel (closed)="togglePinned()" />
      </div>
    </div>
  }

  <!-- Keyboard Shortcuts Help Modal -->
  @if (showShortcuts()) {
    <div
      class="absolute inset-0 z-50 flex items-center justify-center bg-black/50 p-4"
      (click)="toggleShortcuts()"
    >
      <app-keyboard-shortcuts-help
        (click)="$event.stopPropagation()"
        (closed)="toggleShortcuts()"
      />
    </div>
  }

  <app-user-profile-popover />
</div>
