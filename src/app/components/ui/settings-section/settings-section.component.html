<div
  class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm dark:border-white/10 dark:bg-white/5"
>
  <!-- Header with toggle -->
  <div class="flex items-start justify-between">
    <div class="flex-1">
      <h2 class="text-lg font-semibold">{{ title() }}</h2>
      @if (description()) {
        <p class="mt-1 text-sm text-slate-600 dark:text-slate-400">
          {{ description() }}
        </p>
      }
    </div>
    <button
      type="button"
      (click)="toggle()"
      class="rounded-lg p-2 text-slate-500 transition hover:bg-slate-100 hover:text-slate-700 dark:hover:bg-white/10 dark:text-slate-400 dark:hover:text-slate-200"
      [attr.aria-expanded]="!collapsed()"
      [attr.aria-label]="'Toggle ' + title() + ' section'"
    >
      <mat-icon
        class="!h-5 !w-5 transition-transform duration-200"
        [class.rotate-180]="collapsed()"
      >
        expand_more
      </mat-icon>
    </button>
  </div>

  <!-- Content with collapse animation -->
  @if (!collapsed()) {
    <div class="mt-4 animate-fade-in">
      <ng-content />
    </div>
  }
</div>
