<cdk-virtual-scroll-viewport
  #viewport
  [itemSize]="virtualScrollItemSize"
  class="min-h-0 flex-1 overflow-y-auto overflow-x-hidden overscroll-y-contain"
  (scrolledIndexChange)="onScroll()"
>
  <ng-content />
</cdk-virtual-scroll-viewport>
@if (showJumpButton()) {
  <!-- Top indicator when user is at top reading old messages -->
  @if (pendingNewCount() > 0) {
    <div class="pointer-events-none absolute left-0 right-0 top-0 z-20 flex justify-center pt-2">
      <div
        class="flex items-center gap-2 rounded-full border border-violet-200 bg-violet-50 px-3 py-1.5 text-xs font-semibold text-violet-700 shadow-md dark:border-violet-500/30 dark:bg-violet-500/20 dark:text-violet-300"
      >
        <span
          class="inline-flex items-center justify-center rounded-full bg-violet-600 px-1.5 py-0.5 text-[10px] font-bold text-white dark:bg-violet-500"
        >
          {{ pendingNewCount() > 99 ? "99+" : pendingNewCount() }}
        </span>
        <span> {{ pendingNewCount() === 1 ? "new message" : "new messages" }} below </span>
      </div>
    </div>
  }

  <!-- Jump to bottom button -->
  <button
    type="button"
    class="pointer-events-auto absolute bottom-4 right-4 z-20 flex items-center gap-1.5 rounded-full border border-slate-200 bg-white px-3 py-2 text-xs font-semibold text-slate-800 shadow-lg transition hover:bg-slate-50 dark:border-white/15 dark:bg-slate-800 dark:text-slate-100 dark:hover:bg-slate-700"
    (click)="jumpToBottom()"
    title="Jump to latest messages"
  >
    @if (showUnreadCount()) {
      <span
        class="inline-flex min-w-[1.25rem] items-center justify-center rounded-full bg-violet-600 px-1.5 py-0.5 text-[10px] font-bold text-white dark:bg-violet-500"
        [class.animate-pulse]="pendingNewCount() > 5"
      >
        {{ pendingNewCount() > 99 ? "99+" : pendingNewCount() }}
      </span>
    }
    <mat-icon class="!h-5 !w-5 !text-xl leading-none text-violet-600 dark:text-violet-300"
      >expand_more</mat-icon
    >
    @if (showUnreadCount()) {
      <span class="hidden sm:inline">
        {{ pendingNewCount() === 1 ? "1 new message" : pendingNewCount() + " new messages" }}
      </span>
    } @else {
      <span class="hidden sm:inline">Latest</span>
    }
  </button>
}
