<div
  class="flex h-full w-full"
  [class.bg-white]="themeMode() === 'light'"
  [class.text-zinc-900]="themeMode() === 'light'"
  [class.bg-zinc-950]="themeMode() === 'dark'"
  [class.text-zinc-100]="themeMode() === 'dark'"
>
  <!-- Sidebar (desktop only - hidden on mobile) -->
  <aside
    class="sticky top-0 z-45 hidden h-full w-16 shrink-0 md:flex"
    [class.border-r]="true"
    [class.border-zinc-200]="themeMode() === 'light'"
    [class.border-zinc-800]="themeMode() === 'dark'"
    [class.bg-white]="themeMode() === 'light'"
    [class.bg-zinc-900]="themeMode() === 'dark'"
  >
    <app-sidebar />
  </aside>

  <!-- Main content area -->
  <main class="flex h-full min-w-0 flex-1 flex-col overflow-y-auto" role="main">
    @if (!isOnDashboard()) {
      <app-route-aware-header class="shrink-0" (openShortcutDialog)="openShortcutDialog()" />
    }
    <router-outlet />
  </main>

  <!-- Keyboard Shortcuts Dialog (floating modal for desktop) -->
  @if (showShortcutDialog()) {
    <div
      class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4"
      (click)="closeShortcutDialog()"
    >
      <div (click)="$event.stopPropagation()">
        <app-keyboard-shortcuts-dialog (closeShortcutDialog)="closeShortcutDialog()" />
      </div>
    </div>
  }

  <!-- Mobile Bottom Navigation (hidden on desktop) -->
  <app-mobile-nav
    class="fixed bottom-4 left-1/2 z-50 w-auto max-w-[90%] -translate-x-1/2 md:hidden"
  />

  <!-- Debug Panel (fixed position, bottom-right) -->
  @if (showDebugPanel()) {
    <app-debug-panel />
  }
</div>
