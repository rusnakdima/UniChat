<div
  class="flex h-full min-h-0 w-full overflow-hidden bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100"
>
  @if (showSidebar()) {
    <app-sidebar />
  }

  <div class="flex min-h-0 min-w-0 flex-1 flex-col overflow-hidden">
    @if (showHeader()) {
      <app-shared-header
        [title]="headerTitle()"
        [subtitle]="headerSubtitle()"
        [showBackButton]="true"
        backLink="/dashboard"
      />
    }

    <main class="min-h-0 flex-1 overflow-y-auto overscroll-y-contain">
      <router-outlet />
    </main>
  </div>
</div>
