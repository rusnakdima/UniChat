<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>UniChat</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons+Round&display=swap"
      rel="stylesheet"
    />
    <script>
      // Prevent dark mode flicker by applying theme before Angular bootstrap
      (function () {
        try {
          const storedTheme = localStorage.getItem("unichat-theme");
          const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          const theme = storedTheme === "dark" || (!storedTheme && prefersDark) ? "dark" : "light";
          document.documentElement.classList.toggle("dark", theme === "dark");
          document.documentElement.style.colorScheme = theme;
        } catch (e) {
          // Fallback to light theme if localStorage is unavailable
          document.documentElement.style.colorScheme = "light";
        }
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
