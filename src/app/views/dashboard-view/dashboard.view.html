<div
  class="flex h-screen w-full min-h-0 flex-col bg-slate-50 text-slate-900 transition-colors duration-300 dark:bg-slate-950 dark:text-slate-100"
>
  <header
    class="flex w-full shrink-0 items-center justify-between border-b border-slate-200 bg-white px-4 py-3 dark:border-white/10 dark:bg-slate-900"
  >
    <div class="flex items-center gap-4">
      <h1 class="text-lg font-semibold tracking-tight">UniChat</h1>
      <div class="flex items-center gap-2">
        <span
          class="inline-flex items-center rounded-full border border-slate-200 bg-slate-100 px-2.5 py-1 text-xs font-medium text-slate-600 dark:border-white/10 dark:bg-white/5 dark:text-slate-400"
        >
          {{ getFeedMode() === "mixed" ? "Mixed" : "Split" }}
        </span>
      </div>
    </div>

    <div class="flex items-center gap-2">
      @if (getFeedMode() === "split") {
        <button
          type="button"
          (click)="resetSplitSizes()"
          class="inline-flex items-center gap-1.5 rounded-lg border border-slate-200 bg-white px-3 py-1.5 text-xs font-medium text-slate-700 transition hover:bg-slate-50 hover:text-slate-900 dark:border-white/20 dark:bg-white/5 dark:text-slate-300 dark:hover:bg-white/10 dark:hover:text-white"
          title="Reset all block sizes to default"
        >
          <mat-icon class="!h-4 !w-4">restart_alt</mat-icon>
          <span>Reset sizes</span>
        </button>
      }
      <div class="flex items-center gap-1 rounded-xl bg-slate-100 p-1 dark:bg-white/5">
        @for (feedMode of feedModes; track feedMode) {
          <button
            type="button"
            (click)="setFeedMode(feedMode)"
            class="rounded-lg px-3 py-1.5 text-xs font-medium transition"
            [class]="
              dashboardPreferencesService.preferences().feedMode === feedMode
                ? 'bg-white text-slate-900 shadow-sm dark:bg-white/20 dark:text-white'
                : 'text-slate-600 hover:bg-slate-200/50 hover:text-slate-900 dark:text-slate-400 dark:hover:bg-white/10 dark:hover:text-white'
            "
          >
            {{ feedMode === "mixed" ? "Mixed" : "Split" }}
          </button>
        }
      </div>
    </div>
  </header>

  <main class="flex min-h-0 flex-1 flex-col overflow-hidden">
    @if (getFeedMode() === "split") {
      <app-dashboard-split-feed class="flex h-full w-full overflow-hidden" />
    } @else {
      <app-dashboard-mixed-feed class="flex h-full w-full flex-col overflow-y-auto" />
    }
  </main>

  <app-user-profile-popover />
</div>
