<div class="relative flex min-h-0 flex-1 flex-col">
  <cdk-virtual-scroll-viewport
    #viewport
    [itemSize]="virtualScrollItemSize"
    class="min-h-0 flex-1 overflow-y-auto overflow-x-hidden overscroll-y-contain"
  >
    <ng-content />
  </cdk-virtual-scroll-viewport>

  @if (showJumpButton()) {
    <!-- Jump to bottom button - Positioned at bottom-right of chat region -->
    <div class="pointer-events-none absolute bottom-0 right-0 z-50 p-4">
      <button
        type="button"
        class="pointer-events-auto flex items-center gap-1.5 rounded-full border border-slate-200 bg-white px-3 py-2 text-xs font-semibold text-slate-800 shadow-lg transition hover:bg-slate-50 dark:border-white/15 dark:bg-slate-800 dark:text-slate-100 dark:hover:bg-slate-700"
        (click)="jumpToBottom()"
        title="Jump to latest messages"
      >
        @if (showUnreadCount()) {
          <span
            class="inline-flex min-w-5 items-center justify-center rounded-full bg-violet-600 px-1.5 py-0.5 text-[10px] font-bold text-white dark:bg-violet-500"
            [class.animate-pulse]="pendingNewCount() > 5"
          >
            {{ pendingNewCount() > 99 ? "99+" : pendingNewCount() }}
          </span>
        }
        <mat-icon
          [fontIcon]="'expand_more'"
          class="h-5! w-5! text-xl! leading-none text-violet-600 dark:text-violet-300"
        />
        @if (showUnreadCount()) {
          <span class="hidden sm:inline">
            {{ pendingNewCount() === 1 ? "new message" : "new messages" }}
          </span>
        }
      </button>
    </div>
  }
</div>
